<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Recommendator - Large View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet">
</head>
<body class="bg-gray-900 h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-4xl bg-gray-800 rounded-xl shadow-2xl flex flex-col h-[85vh] overflow-hidden border border-gray-700">
        
        <div class="p-4 bg-indigo-700 text-white font-bold text-xl flex items-center gap-2 shadow-md">
            <span>🎬</span> AI Movie Recommendator
        </div>
        
        <div id="chat-content" class="flex-1 p-6 overflow-y-auto text-gray-200 space-y-4 bg-gray-800/50">
            <div class="bot-msg"> Chào bạn! Tôi là AI Movie Recommendator. Bạn muốn xem phim gì hôm nay? </div>
        </div>

        <div class="p-4 border-t border-gray-700 bg-gray-800 flex gap-3">
            <input id="user-input" type="text" 
                class="flex-1 bg-gray-900 text-white p-3 rounded-lg border border-gray-600 focus:outline-none focus:border-indigo-500 transition-all" 
                placeholder="Ví dụ: Gợi ý phim khoa học viễn tưởng...">
            
            <button onclick="sendMsg()" 
                class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-indigo-500 active:scale-95 transition-all">
                Gửi
            </button>
        </div>
    </div>
   
</body>
</html>

<script>
    async function sendMsg() {
        const input = document.getElementById('user-input');
        const chatContent = document.getElementById('chat-content');
        
        const message = input.value.trim();
        if (!message) return;

        // 1. Hiển thị tin nhắn người dùng (Dùng class user-msg)
        chatContent.innerHTML += `
            <div class="flex justify-end">
                <div class="user-msg">${message}</div>
            </div>
        `;
        
        input.value = '';
        chatContent.scrollTop = chatContent.scrollHeight;

        try {
            // 2. Gọi API đến Server Node.js
            const response = await fetch('http://localhost:3000/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message })
            });
            
            const data = await response.json();

            // 3. Hiển thị phản hồi từ AI (Dùng class bot-msg)
            chatContent.innerHTML += `
                <div class="flex justify-start">
                    <div class="bot-msg">${data.reply}</div>
                </div>
            `;
            
        } catch (err) {
            chatContent.innerHTML += `
                <div class="flex justify-start">
                    <div class="bot-msg" style="color: #f87171;">❌ Lỗi kết nối server rồi bạn ơi!</div>
                </div>
            `;
        }

        // Luôn cuộn xuống cuối sau khi có tin nhắn mới
        chatContent.scrollTop = chatContent.scrollHeight;
    }

    // Cho phép nhấn Enter để gửi
    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            sendMsg();
        }
    });
</script>

<style>
    /* Tùy chỉnh thanh cuộn */
    #chat-content::-webkit-scrollbar {
        width: 6px;
    }
    #chat-content::-webkit-scrollbar-thumb {
        background-color: #4b5563;
        border-radius: 10px;
    }

    /* Định dạng tin nhắn Bot */
    .bot-msg {
        background-color: #374151; /* Gray-700 */
        padding: 12px 16px;
        border-radius: 12px;
        border-top-left-radius: 2px;
        width: fit-content;
        max-width: 85%;
        line-height: 1.6;
        border: 1px solid #4b5563;
        white-space: pre-wrap; /* Quan trọng: Giúp nhận diện dấu xuống dòng \n */
        word-break: break-word;
    }

    /* Định dạng tin nhắn User */
    .user-msg {
        background-color: #4f46e5; /* Indigo-600 */
        color: white;
        padding: 12px 16px;
        border-radius: 12px;
        border-top-right-radius: 2px;
        width: fit-content;
        max-width: 85%;
        margin-left: auto; /* Đẩy sang phải */
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    /* Hiệu ứng mượt khi hiện tin nhắn */
    #chat-content div {
        animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
